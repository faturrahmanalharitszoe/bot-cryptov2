# ========================
# Bot-CryptoV2 Configuration — SCALPING MODE
# ========================

trading:
  mode: backtest  # backtest | testnet | live
  pairs:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - DOGE/USDT
    - SHIB/USDT
    - PEPE/USDT
    - WIF/USDT
    - FLOKI/USDT
    - BONK/USDT
    - MEME/USDT
    - BOME/USDT
    - BRETT/USDT
    - POPCAT/USDT
  timeframes:
    - 5m         # primary timeframe for scalping (~288 bars/day)
    - 15m        # context timeframe for trend confirmation
  default_market: futures  # futures preferred for scalping (lower fees, shorting)
  max_leverage: 5

model:
  input_window: 20           # 20 bars × 5m = 100min lookback (scalping)
  retrain_interval_hours: 24
  ensemble_weights:
    cnn_lstm: 0.35
    transformer: 0.35
    mlp_head: 0.30
  # CNN-LSTM branch — shallower for faster CPU training
  cnn:
    filters: [32, 64]        # was [64, 128] — halved filters
    kernel_sizes: [3, 5]
    dropout: 0.3
  # LSTM branch — unidirectional saves ~2x time vs bidirectional
  lstm:
    hidden_size: 64          # was 128 — halved hidden size
    num_layers: 1            # was 2 — single layer enough for CPU
    dropout: 0.2
    bidirectional: false     # was true — bidirectional doubles compute
    attention: false         # was true — skip attention on CPU
  # Transformer branch — 2 layers instead of 4
  transformer:
    d_model: 64              # was 128 — halved
    nhead: 4                 # was 8 — must divide d_model (64/4=16 ✓)
    num_layers: 2            # was 4 — halved
    dim_feedforward: 128     # was 256 — halved
    dropout: 0.1
  # Training
  training:
    batch_size: 256          # was 32 — larger batch = fewer iterations = faster epoch
    epochs: 50               # was 100 — early stopping will kick in anyway
    learning_rate: 0.001
    weight_decay: 0.0001
    scheduler: cosine
    early_stopping_patience: 10  # was 15 — faster convergence detection
    validation_split: 0.15
    test_split: 0.10
    max_ram_mb: 0            # disable RAM cap warning (it was noisy, not actionable)
    gc_every_n_epochs: 5     # was 1 — GC every epoch wastes time on CPU

    # -----------------------------------------------------------------------
    # Class-imbalance handling (Neutral typically 60-70% of labels)
    # -----------------------------------------------------------------------
    use_class_weights: false      # disabled to avoid double-penalizing with Focal Loss
    use_weighted_sampler: true    # WeightedRandomSampler for balanced mini-batches
    label_smoothing: 0.1          # prevents overconfidence; improves calibration
    focal_loss_gamma: 2.0         # set to 2.0 to use Focal Loss instead of CE
    mixup_alpha: 0.0              # set to 0.4 to enable Mixup augmentation

    # Use macro_f1 for checkpointing (more imbalance-aware than val_loss)
    # Options: val_loss | macro_f1
    early_stopping_metric: macro_f1

signal:
  confidence_threshold: 0.35   # slightly above random (0.33) — more signals for scalping
  magnitude_threshold: 0.0003  # 0.03% minimum — scalp targets are tiny
  cooldown_minutes: 5          # 1 bar cooldown (5m) — high-frequency scalp signals
  position_size_pct: 0.15      # must match risk.max_position_pct so signals pass risk check

risk:
  max_position_pct: 0.15       # 15% of portfolio per scalp trade
  max_concurrent_positions: 8  # allow 8 concurrent scalps across 10 pairs
  stop_loss_pct: 0.003         # 0.3% stop-loss — tight scalp risk (typical 5m ATR ~0.1-0.2%)
  take_profit_levels: [0.005, 0.008, 0.012]  # 0.5%, 0.8%, 1.2% — 1.7:1 / 2.7:1 / 4:1 R:R
  take_profit_weights: [0.5, 0.3, 0.2]      # % of position to close at each level
  max_daily_drawdown_pct: 0.05  # 5% daily drawdown limit — tight for scalping
  max_weekly_drawdown_pct: 0.10 # 10% weekly

exchange:
  testnet: true
  rate_limit_per_minute: 1200
  order_type: limit  # limit | market
  slippage_pct: 0.001  # 0.1% expected slippage

scraping:
  ohlcv:
    history_days: 55       # yfinance 5m limit is 60d — stay safely within
    update_interval_sec: 60   # 1 minute — scalping needs fresh data
  orderbook:
    depth: 20              # levels
    update_interval_sec: 60
  sentiment:
    sources:
      - cryptopanic
      - reddit
    update_interval_sec: 900  # 15 minutes
  onchain:
    sources:
      - whale_alert
    update_interval_sec: 1800  # 30 minutes

storage:
  data_dir: data
  raw_dir: data/raw
  features_dir: data/features
  models_dir: models/saved

backtest:
  start_date: "2026-04-01"
  end_date: "2026-06-08"
  initial_capital: 10000.0
  commission_spot: 0.001       # 0.1%
  commission_futures: 0.0004   # 0.04% taker (scalping uses market orders)
  slippage: 0.0003             # 0.03% — tighter slippage for liquid pairs
  walk_forward:
    train_months: 1            # only ~2 months of 5m data available
    test_months: 1
    step_months: 1

monitoring:
  dashboard:
    enabled: true
    port: 8501
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  logging:
    level: INFO
    file: logs/bot.log
    max_bytes: 10485760  # 10MB
    backup_count: 5
